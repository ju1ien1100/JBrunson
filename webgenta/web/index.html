<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Webgenta — MRT2 Browser Streaming</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --border: #2a2a2a;
      --purple: #7c3aed;
      --purple-light: #a78bfa;
      --text: #e5e5e5;
      --muted: #737373;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: ui-monospace, "Cascadia Code", "Fira Code", monospace;
      font-size: 14px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
      gap: 1.5rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--purple-light);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem;
      width: 100%;
      max-width: 640px;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    label {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      color: var(--muted);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input, select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      padding: 0.5rem 0.75rem;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus, select:focus {
      border-color: var(--purple);
    }

    .row {
      display: flex;
      gap: 0.75rem;
      align-items: flex-end;
    }

    .row label { flex: 1; }

    button {
      background: var(--purple);
      border: none;
      border-radius: 4px;
      color: #fff;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 0.55rem 1.25rem;
      transition: background 0.15s;
      white-space: nowrap;
    }

    button:hover { background: #6d28d9; }

    #status {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 99px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      background: var(--border);
      color: var(--muted);
    }

    #status[data-status="streaming"] {
      background: #14532d;
      color: #86efac;
    }

    #status[data-status="connecting"],
    #status[data-status="embedding"] {
      background: #1c1917;
      color: #fbbf24;
    }

    #status[data-status="error"] {
      background: #450a0a;
      color: #fca5a5;
    }

    canvas {
      width: 100%;
      max-width: 640px;
      height: 120px;
      border-radius: 6px;
      display: block;
    }

    .hint {
      color: var(--muted);
      font-size: 0.75rem;
      text-align: center;
    }
  </style>
</head>
<body>

  <h1>webgenta</h1>

  <div class="card">
    <label>
      Prompt
      <input id="prompt" type="text" placeholder="disco funk, electric guitar, upbeat" />
    </label>

    <div class="row">
      <label>
        Server
        <input id="server" type="text" value="ws://localhost:8765" />
      </label>
      <button id="connect-btn">Connect</button>
      <span id="status">Idle</span>
    </div>

    <label>
      MIDI Input
      <select id="midi-select">
        <option value="">— No MIDI —</option>
      </select>
    </label>
  </div>

  <canvas id="viz" width="1280" height="240"></canvas>

  <p class="hint">
    Connect to start streaming · Change the prompt while streaming to update style ·
    MIDI channel 10 = drums
  </p>

  <script type="module" src="main.ts"></script>
</body>
</html>
